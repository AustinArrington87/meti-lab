{% extends "base.html" %}
{% block title %}METI Lab — {{ file_name }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
{% endblock %}

{% block content %}
<div class="chat-layout">

  <!-- LEFT: Chat panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <span class="chat-file">{{ file_name }}</span>
      <span class="chat-meta">{{ feature_count }} field{{ 's' if feature_count != 1 else '' }}</span>
      <button id="risk-btn" class="btn-risk" onclick="runRiskCheck()" title="Check for conflicts with existing METI sources">
        Check Risk
      </button>
      <button id="insights-btn" class="btn-insights" onclick="runInsights()" title="Fetch UFFDA land use, soil, and climate data for carbon market eligibility screening">
        Get Insights
      </button>
      <button id="export-btn" class="btn-export" style="display:none" onclick="exportFile()">
        Export METI GeoJSON
      </button>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input-row">
      <textarea id="user-input" class="chat-input" rows="2"
                placeholder="Ask a question or provide metadata…"
                onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- RIGHT: Map panel -->
  <div class="map-panel">
    <div id="map"></div>
    <div class="map-legend" id="map-legend">
      <span id="leg-checking" style="color:#6b7280;font-size:.78rem">Checking conflicts…</span>
      <span class="legend-dot clean" style="display:none" id="leg-green"></span>
      <span id="leg-green-label" style="display:none"> Clear </span>
      <span class="legend-dot conflict" style="display:none" id="leg-red"></span>
      <span id="leg-red-label" style="display:none"> Conflict </span>
      <span class="legend-dot unknown" style="display:none" id="leg-yellow"></span>
      <span id="leg-yellow-label" style="display:none"> Medium Risk </span>
    </div>
  </div>

</div>

<script>
const SESSION_ID = "{{ session_id }}";
const FEATURES = {{ features | tojson }};
const OPENING_MESSAGE = {{ opening_message | tojson }};

// risk state: feature_id → "unchecked" | "green" | "yellow" | "red"
const riskState = {};
FEATURES.forEach(f => { riskState[f.id] = "unchecked"; });

// ---------------------------------------------------------------------------
// Markdown renderer
// ---------------------------------------------------------------------------
function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\|([^\n]+)\|/g, '<span class="tbl-row">$1</span>')
    .replace(/\n/g, '<br>');
}

// ---------------------------------------------------------------------------
// Map
// ---------------------------------------------------------------------------
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const featureLayers = {};  // feature_id → Leaflet layer
const allBounds = [];

const RISK_STYLE = {
  unchecked: { color: '#6b7280', fillColor: '#d1d5db', weight: 1.5, fillOpacity: 0.5 },
  green:     { color: '#10b981', fillColor: '#d1fae5', weight: 2.5, fillOpacity: 0.45 },
  yellow:    { color: '#f59e0b', fillColor: '#fef3c7', weight: 2.5, fillOpacity: 0.45 },
  red:       { color: '#ef4444', fillColor: '#fee2e2', weight: 2.5, fillOpacity: 0.5 },
};

FEATURES.forEach(f => {
  if (!f.geometry) return;
  const layer = L.geoJSON({ type: 'Feature', geometry: f.geometry, properties: {} },
    { style: RISK_STYLE.unchecked });
  layer.bindTooltip(`<strong>${f.id}</strong><br>${f.hectares || '?'} ha`, { sticky: true });
  layer.addTo(map);
  featureLayers[f.id] = layer;
  try {
    const b = layer.getBounds();
    if (b.isValid()) allBounds.push(b);
  } catch (e) {}
});

if (allBounds.length) {
  const combined = allBounds.reduce((a, b) => a.extend(b), allBounds[0]);
  map.fitBounds(combined, { padding: [20, 20] });
}

function applyRiskToMap(featureId, risk) {
  riskState[featureId] = risk;
  const layer = featureLayers[featureId];
  if (layer) layer.setStyle(RISK_STYLE[risk] || RISK_STYLE.unchecked);
}

function updateLegend() {
  const vals = Object.values(riskState);
  document.getElementById('leg-checking').style.display = 'none';
  const show = (id, labelId, visible) => {
    document.getElementById(id).style.display = visible ? 'inline-block' : 'none';
    if (labelId) document.getElementById(labelId).style.display = visible ? 'inline' : 'none';
  };
  show('leg-green', 'leg-green-label', vals.includes('green'));
  show('leg-red', 'leg-red-label', vals.includes('red'));
  show('leg-yellow', 'leg-yellow-label', vals.includes('yellow'));
}

// ---------------------------------------------------------------------------
// Risk check
// ---------------------------------------------------------------------------
async function runRiskCheck() {
  const btn = document.getElementById('risk-btn');
  btn.disabled = true;
  btn.textContent = 'Checking…';

  appendMessage('agent', 'Checking your fields against the METI source ledger…', 'risk-checking');

  try {
    const resp = await fetch('/risk-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    const data = await resp.json();

    if (data.error) {
      setMessageHtml('risk-checking', `Risk check failed: ${data.error}`);
      btn.textContent = 'Check Risk';
      btn.disabled = false;
      return;
    }

    // Apply colors to the map
    const riskMap = data.risk_map || {};
    Object.entries(riskMap).forEach(([featureId, info]) => {
      applyRiskToMap(featureId, info.risk);
    });
    updateLegend();

    // Build summary message
    const s = data.summary || {};
    const total = (s.green || 0) + (s.yellow || 0) + (s.red || 0);
    const lines = [`**Risk check complete** (${total} field${total !== 1 ? 's' : ''})`];

    if ((s.green || 0) > 0)  lines.push(`- **${s.green} clear** (green) — no overlap with existing sources`);
    if ((s.red   || 0) > 0)  lines.push(`- **${s.red} conflict** (red) — geometry and dates overlap an existing METI source`);
    if ((s.yellow|| 0) > 0)  lines.push(`- **${s.yellow} potential** (yellow) — geometry overlaps an existing source, but dates not yet confirmed`);

    if (!data.has_dates) {
      lines.push('\n_Tip: provide start and end dates so the system can confirm or clear these potential conflicts._');
    }

    const redEntries    = Object.entries(riskMap).filter(([, v]) => v.risk === 'red');
    const yellowEntries = Object.entries(riskMap).filter(([, v]) => v.risk === 'yellow' && (v.conflict_with || []).length);

    if (redEntries.length) {
      const rows = redEntries.map(([id, v]) =>
        `  - **${id}** conflicts with: ${(v.conflict_with || []).join(', ') || 'unknown source'}`
      ).join('\n');
      lines.push('\n**Confirmed conflicts:**\n' + rows);
    }
    if (yellowEntries.length) {
      const rows = yellowEntries.map(([id, v]) =>
        `  - **${id}** overlaps: ${(v.conflict_with || []).join(', ') || 'unknown source'} _(dates unverified)_`
      ).join('\n');
      lines.push('\n**Potential conflicts (geometry only):**\n' + rows);
    }

    setMessageHtml('risk-checking', lines.join('\n'));
    btn.textContent = 'Re-check Risk';
    btn.disabled = false;

  } catch (err) {
    setMessageHtml('risk-checking', `Network error during risk check: ${err}`);
    btn.textContent = 'Check Risk';
    btn.disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Insights
// ---------------------------------------------------------------------------
async function runInsights() {
  const btn = document.getElementById('insights-btn');
  btn.disabled = true;
  btn.textContent = 'Fetching…';

  appendMessage('agent',
    'Fetching UFFDA field data (land cover, soil, drought, crop history, protected areas)… this may take 15–45 seconds.',
    'insights-fetching'
  );

  try {
    const resp = await fetch('/insights/enrich', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    const data = await resp.json();

    if (data.error) {
      setMessageHtml('insights-fetching', `Insights fetch failed: ${data.error}`);
      btn.textContent = 'Get Insights';
      btn.disabled = false;
      return;
    }

    const scored = data.scored || [];
    const lines = [];

    lines.push('**Field Insights — Ecosystem Services Screening**');
    lines.push('');
    lines.push(`${scored.length} field${scored.length !== 1 ? 's' : ''} analyzed via UFFDA enrichment.`);
    lines.push('');

    // Per-field soil / land table (no scores)
    lines.push('| Field | Land Cover | SOM | pH | Irrigation |');
    lines.push('| --- | --- | --- | --- | --- |');
    for (const s of scored) {
      const som = s.som != null ? s.som.toFixed(2) + '%' : '—';
      const ph = s.ph != null ? s.ph.toFixed(1) : '—';
      const lc = s.land_cover || '—';
      const irr = s.irrigation || '—';
      lines.push(`| ${s.id} | ${lc} | ${som} | ${ph} | ${irr} |`);
    }
    lines.push('');

    // CDL crop history table (current year + 4 prior)
    const allYears = new Set();
    for (const s of scored) {
      for (const h of (s.crop_history || [])) {
        if (h.year) allYears.add(h.year);
      }
    }
    const cdlYears = Array.from(allYears).sort();
    if (cdlYears.length > 0) {
      const currentCdlYear = cdlYears[cdlYears.length - 1];
      lines.push('**Cropland Data Layer (CDL) — 5-year History**');
      lines.push('');
      lines.push('| Field | ' + cdlYears.join(' | ') + ' |');
      lines.push('| --- |' + cdlYears.map(() => ' --- |').join(''));

      const baselineMatches = [];
      for (const s of scored) {
        const byYear = {};
        for (const h of (s.crop_history || [])) { byYear[h.year] = h.crop || '—'; }
        const cells = cdlYears.map(y => byYear[y] || '—');
        lines.push(`| ${s.id} | ${cells.join(' | ')} |`);

        // Note if current-year crop also appears in any prior year (rotation baseline)
        const currentCrop = byYear[currentCdlYear];
        const priorMatch = currentCrop && cdlYears
          .filter(y => y < currentCdlYear)
          .find(y => byYear[y] === currentCrop);
        if (currentCrop && priorMatch) {
          baselineMatches.push(`**${s.id}** (${currentCrop} also in ${priorMatch})`);
        }
      }
      lines.push('');

      if (baselineMatches.length > 0) {
        lines.push(`*Historical baseline match — same crop as ${currentCdlYear}: ${baselineMatches.join(', ')}*`);
        lines.push('');
      }
    }

    // Carbon market candidates — SOM, pH, irrigation only, no numeric score
    const carbonHigh = scored.filter(s => s.programs && s.programs.soil_carbon && s.programs.soil_carbon.score >= 60);
    if (carbonHigh.length > 0) {
      lines.push('**Carbon Market Candidates (Soil Carbon)**');
      lines.push('');
      for (const s of carbonHigh) {
        const sc = s.programs.soil_carbon;
        const som = s.som != null ? `SOM ${s.som.toFixed(2)}%` : null;
        const ph = s.ph != null ? `pH ${s.ph.toFixed(1)}` : null;
        const irr = s.irrigation || null;
        const attrs = [som, ph, irr].filter(Boolean).join(', ');
        lines.push(`- **${s.id}** — ${sc.rating}${attrs ? ' — ' + attrs : ''}`);
      }
      lines.push('');
    }

    lines.push('*Ask the agent to discuss specific fields or carbon market fit.*');

    setMessageHtml('insights-fetching', lines.join('\n'));
    btn.textContent = 'Re-run Insights';
    btn.disabled = false;

  } catch (err) {
    setMessageHtml('insights-fetching', `Network error during insights fetch: ${err}`);
    btn.textContent = 'Get Insights';
    btn.disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Chat
// ---------------------------------------------------------------------------
const messagesEl = document.getElementById('chat-messages');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');

function appendMessage(role, html, id) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  if (id) div.id = id;
  const inner = document.createElement('div');
  inner.className = 'msg-content';
  inner.innerHTML = typeof html === 'string' && html.includes('<') ? html : renderMarkdown(html);
  div.appendChild(inner);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function setMessageHtml(id, html) {
  const el = document.getElementById(id);
  if (el) el.querySelector('.msg-content').innerHTML = renderMarkdown(html);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

if (OPENING_MESSAGE) {
  appendMessage('agent', OPENING_MESSAGE, 'opening-msg');
}

// Auto-run risk check on load
window.addEventListener('load', () => runRiskCheck());

// Silent re-check: updates map + legend without a full chat summary
async function silentRiskCheck() {
  try {
    const resp = await fetch('/risk-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    const data = await resp.json();
    if (data.risk_map) {
      Object.entries(data.risk_map).forEach(([id, info]) => applyRiskToMap(id, info.risk));
      updateLegend();
      const s = data.summary || {};
      const parts = [];
      if (s.red)    parts.push(`${s.red} conflict`);
      if (s.yellow) parts.push(`${s.yellow} potential`);
      if (s.green)  parts.push(`${s.green} clear`);
      appendMessage('agent', `Risk updated: ${parts.join(', ') || 'all clear'}.`);
    }
  } catch (_) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendMessage() {
  const msg = inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  sendBtn.disabled = true;
  inputEl.disabled = true;

  appendMessage('user', msg);

  const replyId = 'reply-' + Date.now();
  appendMessage('agent', '<em>Thinking…</em>', replyId);

  let buffer = '';
  let partial = '';

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: SESSION_ID, message: msg })
  })
  .then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus(); return; }

        partial += decoder.decode(value, { stream: true });
        const lines = partial.split('\n');
        partial = lines.pop();

        lines.forEach(line => {
          line = line.trim();
          if (!line.startsWith('data: ')) return;
          try {
            const parsed = JSON.parse(line.slice(6));
            if (parsed.type === 'text') {
              buffer += parsed.content;
              setMessageHtml(replyId, buffer);
            } else if (parsed.type === 'done') {
              if (parsed.export_ready) document.getElementById('export-btn').style.display = 'inline-block';
              if (parsed.dates_updated) silentRiskCheck();
              sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus();
            } else if (parsed.type === 'error') {
              buffer += '\n\nError: ' + parsed.content;
              setMessageHtml(replyId, buffer);
              sendBtn.disabled = false; inputEl.disabled = false;
            }
          } catch (e) {}
        });
        read();
      });
    }
    read();
  })
  .catch(err => {
    setMessageHtml(replyId, 'Network error: ' + err);
    sendBtn.disabled = false; inputEl.disabled = false;
  });
}

async function exportFile() {
  const btn = document.getElementById('export-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Preparing…';
  try {
    const resp = await fetch(`/export/${SESSION_ID}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      appendMessage('agent', `Export failed: ${err.error || resp.statusText}`);
      return;
    }
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `meti_${SESSION_ID.slice(0, 8)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    appendMessage('agent', `Export failed: ${err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}
</script>
{% endblock %}
